server:
  port: 8000
  shutdown: graceful

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${POSTGRES_DB:taskflow}
    username: ${POSTGRES_USER:taskflow}
    password: ${POSTGRES_PASSWORD:taskflow}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET}
    algorithm: HS256
    expire-hours: ${JWT_EXPIRE_HOURS:24}
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    com.taskflow: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
